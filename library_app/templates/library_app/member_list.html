<!doctype html>
<html>
  <head>
    <title>Members</title>
  </head>
  <body>
    <h1>Library Members</h1>

    <ul>
      {% for member in members %}
      <li>
        <a href="{% url 'member_detail' member.member_id %}">
          {{ member.name }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </body>
</html>
